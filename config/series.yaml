# DRI Price Layer — series configuration
#
# Active component weights sum to 0.84 (11 components). The remaining 0.10 is
# the quarterly_reserve placeholder (deferred). The transform normalizes weights
# over components actually present in the index, so the composite always sums
# to 100 at the base period.
#
# Field reference:
#   cadence            weekly | monthly | quarterly | semiannual | annual
#   expected_lag_days  Age beyond which the series is considered stale (warning, carry-forward)
#   hard_fail_days     Age beyond which the pipeline aborts; data is genuinely broken
#   carry_forward      true: hold last value across gaps; false: staleness is a real signal
#   excluded_from_index  true: fetched, validated, tracked in metadata — but not weighted in DRI
#   deferred           true: skip entirely (no fetch, no validate, no contribution)
#
# Threshold formula (for start-of-period series):
#   expected_lag_days  ≈  L + C        + small buffer (5–10 days)
#   hard_fail_days     ≈  L + 2C       + delayed-release buffer (~10%)
# where L = publication lag, C = cadence interval in days.
# See src/validate.py for full documentation.

dri_components:

  - id: rent
    weight: 0.18
    source: zillow
    series_id: Metro_zori_uc_sfrcondomfr_sm_sa_month
    zillow_dataset: zori_sfrcondomfr_sm_sa
    region: United States
    cadence: monthly
    expected_lag_days: 50             # ZORI typically releases 20–25 days after month-end
    hard_fail_days: 110
    carry_forward: true
    backfill_source: bls
    backfill_series_id: CUSR0000SEHA    # CPI Rent of Primary Residence, SA
    backfill_until: "2014-12-31"
    notes: |
      ZORI 2015-01+. Pre-2015 chain-linked to BLS CPI rent of primary residence (CUSR0000SEHA).
      Methodologically defensible: same conceptual measure (residential rent paid), different
      sampling (BLS smoothed in-place rent; ZORI asking rent for new listings). Chain-linking
      preserves ZORI's level and percent changes from 2015 onward; uses BLS percent changes
      for 2000-2014 history only.
      Zillow Observed Rent Index — smoothed, seasonally adjusted, SFR + condo + multifamily.
      National rolling average (RegionType=country, RegionName="United States").

  - id: mortgage_payment
    weight: 0.11
    source: derived
    inputs:
      - {fetcher: fred, series_id: MSPUS}        # Median US home sale price, quarterly
      - {fetcher: fred, series_id: MORTGAGE30US}  # 30-yr fixed rate, weekly
    transform: monthly_payment_30yr
    cadence: quarterly
    expected_lag_days: 210
    hard_fail_days: 320
    carry_forward: true
    notes: "MSPUS is quarterly with ~90d lag. Mortgage rate updates weekly — the binding cadence is MSPUS."

  - id: food_at_home
    weight: 0.13
    source: bls
    series_id: CUSR0000SAF11
    cadence: monthly
    expected_lag_days: 45
    hard_fail_days: 100
    carry_forward: true

  - id: gas
    weight: 0.10
    source: eia
    series_id: PET.EMM_EPMR_PTE_NUS_DPG.W
    resample_method: mean
    cadence: weekly
    expected_lag_days: 10
    hard_fail_days: 20
    carry_forward: false
    notes: "EIA occasionally releases on Tuesday; 10d expected avoids false alarms on Sunday runs. Weekly should always be fresh; staleness is a real signal."

  - id: auto_insurance
    weight: 0.06
    source: bls
    series_id: CUSR0000SETE
    cadence: monthly
    expected_lag_days: 45
    hard_fail_days: 100
    carry_forward: true

  - id: cc_interest
    weight: 0.06
    source: fred
    series_id: TERMCBCCINTNS
    cadence: quarterly
    expected_lag_days: 210
    hard_fail_days: 320
    carry_forward: true
    notes: |
      FRED: Commercial Bank Interest Rate on Credit Card Plans, Accounts Assessed Interest.
      Chosen over TERMCBCCALLNS because it isolates the rate paid by households actually
      carrying balances. The "ALL accounts" series dilutes the rate by including paid-in-full
      accounts that incur no interest, which understates the felt cost of revolving credit.
      Quarterly with ~95d publication lag; carry_forward holds the value between releases.

  - id: dining_out
    weight: 0.07
    source: bls
    series_id: CUSR0000SEFV
    cadence: monthly
    expected_lag_days: 45
    hard_fail_days: 100
    carry_forward: true

  - id: utilities
    weight: 0.03
    source: bls
    series_id: CUSR0000SEHF
    cadence: monthly
    expected_lag_days: 45
    hard_fail_days: 100
    carry_forward: true

  - id: used_cars
    weight: 0.04
    source: bls
    series_id: CUSR0000SETA02
    cadence: monthly
    expected_lag_days: 45
    hard_fail_days: 100
    carry_forward: true

  - id: eggs
    weight: 0.03
    source: bls
    series_id: APU0000708111
    cadence: monthly
    expected_lag_days: 50             # APU has slightly longer publication lag than CUSR
    hard_fail_days: 110
    carry_forward: true

  - id: home_insurance
    weight: 0.03
    source: bls
    series_id: CUUR0000SEHD
    cadence: monthly
    expected_lag_days: 45
    hard_fail_days: 100
    carry_forward: true
    notes: "CPI tenants and household insurance. NSA only."

  - id: quarterly_reserve
    weight: 0.10
    source: manual
    manual_csv: data/raw/manual/quarterly_reserve.csv
    cadence: quarterly
    expected_lag_days: 210
    hard_fail_days: 320
    carry_forward: true
    sub_components:
      - {id: new_car_payment,  notional_weight: 0.04,  source_hint: "Cox Automotive / KBB transaction prices + auto loan rate"}
      - {id: streaming_stack,  notional_weight: 0.02,  source_hint: "Manual: median price of a defined SVOD bundle (Netflix Std + Max + Disney+ + one music)"}
      - {id: shrinkflation,    notional_weight: 0.02,  source_hint: "Consumer World tracker (Edgar Dworsky) — count-based proxy"}
      - {id: ticket_prices,    notional_weight: 0.02,  source_hint: "Pollstar Top 100 average ticket price (manual quarterly)"}
    notes: |
      The 10% reserve specified in the original DRI methodology. Held as a single
      composite for now; manual quarterly updates from the four sub-components above.
      To activate: populate data/raw/manual/quarterly_reserve.csv with columns
      [date, value] where value is the rebased (Jan 2020 = 100) composite of the
      four sub-components weighted by their notional_weight. Then set deferred: false.

# Comparison line for DRI vs CPI chart.
# Not a DRI component; fetched separately and passed to the transform.
cpi_headline:
  id: cpi_headline
  source: bls
  series_id: CUSR0000SA0
  cadence: monthly
  expected_lag_days: 45
  hard_fail_days: 100
  carry_forward: true
  notes: "CPI all items, seasonally adjusted. Used as the official comparison line."

mercury_components:
  - id: umich
    source: fred
    series_id: UMCSENT
    cadence: monthly
    expected_lag_days: 50
    hard_fail_days: 100
    carry_forward: true
    weight: 0.45
    notes: "U-Mich Consumer Sentiment headline (ICS). Monthly."

  - id: conference_board
    source: manual
    series_id: conference_board
    manual_csv: data/raw/manual/ccb.csv
    cadence: monthly
    expected_lag_days: 50
    hard_fail_days: 100
    carry_forward: true
    weight: 0.45
    notes: |
      Conference Board Consumer Confidence headline. Manually populated from
      conference-board.org monthly press release (one number per month).

  - id: conference_board_present_situation
    source: manual
    manual_csv: data/raw/manual/ccb.csv
    cadence: monthly
    stress_direction: down
    notes: |
      CB Present Situation Index. Reflects perceived current conditions.
      Records preliminary value at release — never update to revised.
      Starts May 2026; history builds forward.

  - id: conference_board_expectations
    source: manual
    manual_csv: data/raw/manual/ccb.csv
    cadence: monthly
    stress_direction: down
    notes: |
      CB Expectations Index. Forward-looking 6-month outlook.
      Records preliminary value at release — never update to revised.
      Gap vs. Present Situation (Expectations - Present Situation) is a
      leading sentiment turning-point signal. Starts May 2026.

  - id: oecd_confidence
    source: oecd
    series_id: USACSCICP02STSAM
    cadence: monthly
    expected_lag_days: 50
    hard_fail_days: 100
    carry_forward: true
    weight: 0.10
    notes: |
      OECD Consumer Confidence Indicator for the United States (amplitude adjusted).

mercury_caveats:
  - id: umich_expectations
    source: fred
    series_id: MICH
    cadence: monthly
    expected_lag_days: 50
    hard_fail_days: 100
    carry_forward: true
    notes: |
      U-Mich 1-Year Inflation Expectation (median). Not part of the Mercury
      sentiment composite. Used as the Partisan Distortion cross-check —
      when MICH diverges from felt inflation (DRI YoY) by more than ~1 std
      dev, sentiment readings may be politically driven rather than
      economically grounded.

  # DRI from Phase 1 already in store — no new fetch needed.

  # Google Trends basket — pulled via pytrends, not series.yaml:
  # terms: ["recession", "layoffs", "stagflation", "vibecession"]
  # window: trailing 5-year rolling, normalized 0–100

  # ============================================================
# DRI-B: Behavior Layer
# Add this block to config/series.yaml alongside dri_components.
#
# DRI-B is a dashboard of directional stress readings — not a
# composite index. No weights. Each indicator is assessed for
# direction (stress / relief / flat) independently.
# ============================================================

dri_b_components:

  # ----------------------------------------------------------
  # FRED automated pulls (use existing fred fetcher)
  # ----------------------------------------------------------

  - id: savings_rate
    source: fred
    series_id: PSAVERT
    cadence: monthly
    expected_lag_days: 35
    hard_fail_days: 70
    carry_forward: true
    stress_direction: down
    notes: |
      Personal saving as % of disposable income (BLS/BEA via FRED).
      Falling = households drawing down savings buffer = stress signal.
      Releases ~4 weeks after month end with Personal Income & Outlays.

  - id: revolving_credit
    source: fred
    series_id: REVOLSL
    cadence: monthly
    expected_lag_days: 40
    hard_fail_days: 75
    carry_forward: true
    stress_direction: up
    notes: |
      Revolving consumer credit outstanding, seasonally adjusted ($B).
      Rising = credit card debt accumulation = stress signal.
      Federal Reserve G.19 Consumer Credit report, releases ~5 weeks after month end.

  - id: multiple_job_holders
    source: fred
    series_id: LNS12026620
    cadence: monthly
    expected_lag_days: 10
    hard_fail_days: 45
    carry_forward: false
    stress_direction: up
    notes: |
      Persons at work in all jobs, multiple jobholders (BLS CPS).
      Rising = labor stress, workers supplementing income = stress signal.
      Releases first Friday of following month with Employment Situation.

  - id: debt_service_ratio
    source: fred
    series_id: TDSP
    cadence: quarterly
    expected_lag_days: 60
    hard_fail_days: 120
    carry_forward: true
    stress_direction: up
    notes: |
      Household debt service payments as % of disposable personal income.
      Federal Reserve Z.1 Financial Accounts, quarterly, releases ~2 months after quarter end.
      Rising = structural financial pressure. Slow-moving but authoritative.

  # ----------------------------------------------------------
  # Manual pulls (same CSV contract as CCB: date, value, series_id)
  # ----------------------------------------------------------

  - id: nyf_sce_miss_prob
    source: manual
    series_id: nyf_sce_miss_prob
    manual_csv: data/raw/manual/nyf_sce.csv
    cadence: monthly
    expected_lag_days: 45
    hard_fail_days: 80
    carry_forward: true
    stress_direction: up
    notes: |
      NY Fed Survey of Consumer Expectations: mean probability (%) of missing
      a minimum debt payment in the next 3 months. Direct proxy for
      paycheck-to-paycheck rate — replaces discontinued LendingClub/PYMNTS series.

      Pull from: https://www.newyorkfed.org/microeconomics/sce#/
      Navigate to: Survey Results → Financial Situation → "Probability of Missing
      a Minimum Debt Payment Over the Next 3 Months"
      Releases: typically 2nd or 3rd Monday of the following month.
      CSV columns: date (YYYY-MM-01), value (mean probability %), series_id (nyf_sce_miss_prob)

  - id: abi_bankruptcies_total
    source: manual
    manual_csv: data/raw/manual/abi_bankruptcies_total.csv
    cadence: quarterly
    expected_lag_days: 45
    hard_fail_days: 90
    carry_forward: false
    stress_direction: up
    notes: |
      Quarterly nonbusiness (individual) bankruptcy filings, all chapters.
      PRIMARY DRI-B stress signal — lagging but unambiguous.
      Source: U.S. Courts F-2 tables at:
      https://www.uscourts.gov/data-news/reports/statistical-reports/bankruptcy-filings-statistics
      Download quarterly Excel files. Use the nonbusiness total column.
      Backfill available Q1 2007–present.

  - id: abi_bankruptcies_ch7
    source: manual
    manual_csv: data/raw/manual/abi_bankruptcies_ch7.csv
    cadence: quarterly
    expected_lag_days: 45
    hard_fail_days: 90
    carry_forward: false
    stress_direction: up
    notes: |
      Quarterly Chapter 7 (liquidation) nonbusiness filings.
      Texture indicator — rising Ch.7 vs. Ch.13 = capitulation phase.
      Same source as abi_bankruptcies_total (U.S. Courts F-2).

  - id: abi_bankruptcies_ch13
    source: manual
    manual_csv: data/raw/manual/abi_bankruptcies_ch13.csv
    cadence: quarterly
    expected_lag_days: 45
    hard_fail_days: 90
    carry_forward: false
    stress_direction: up
    notes: |
      Quarterly Chapter 13 (reorganization) nonbusiness filings.
      Texture indicator — tends to rise before Ch.7 in a stress cycle.
      Same source as abi_bankruptcies_total (U.S. Courts F-2).

  - id: abi_bankruptcies_ch11
    source: manual
    manual_csv: data/raw/manual/abi_bankruptcies_ch11.csv
    cadence: quarterly
    expected_lag_days: 45
    hard_fail_days: 90
    carry_forward: false
    deferred: true
    stress_direction: up
    notes: |
      Quarterly Chapter 11 (business reorganization) nonbusiness filings.
      Upper-income K-shape marker — excluded from DRI-B panel but tracked here
      for editorial reference. Use percentage-change trend for analysis.
      Same source as abi_bankruptcies_total (U.S. Courts F-2).